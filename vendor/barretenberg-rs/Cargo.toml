[package]
name = "barretenberg-rs"
version = "5.0.0-rc.2"
edition = "2021"
rust-version = "1.70"
description = "Rust bindings for Barretenberg (patched: Android libc++ linking). Vendored from aztec-packages v5.0.0-rc.2."
license = "Apache-2.0"

# Generated files (api.rs, generated_types.rs) are vendored in-tree here rather
# than generated by `yarn generate`, so they are committed to this repo.
include = ["src/**/*.rs", "build.rs", "README.md", "NOTICE", "android-libcxx.patch"]

[dependencies]
rmp = "0.8"
rmp-serde = "1.1"
rmpv = "1.0"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.35", features = ["full"], optional = true }
libc = "0.2"
nix = { version = "0.27", features = ["socket", "uio"], optional = true }
thiserror = "1.0"
tracing = { version = "0.1", optional = true }
hex = "0.4"

[features]
# Default to the FFI backend only (no native pipe backend), which is what the
# mobile use case needs. `native` pulls in tokio/nix/tracing for the
# subprocess PipeBackend used on desktop.
default = ["ffi"]
native = ["tokio", "nix", "tracing"]
async = ["tokio"]
# FFI backend: links against libbb-external.a (downloaded by build.rs).
ffi = []
