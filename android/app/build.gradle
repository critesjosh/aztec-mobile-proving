plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'foundation.aztec.noirprover'
    compileSdk 36

    defaultConfig {
        applicationId 'foundation.aztec.noirprover'
        minSdk 29
        targetSdk 36
        versionCode 1
        versionName '0.1-v5.0.0-rc.2'
        ndk {
            abiFilters 'arm64-v8a', 'x86_64'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    // SRS and IVC input assets are read as raw streams; skip APK compression
    // so asset loading is a plain mmap-friendly read.
    androidResources {
        noCompress 'dat', 'msgpack'
    }
}
